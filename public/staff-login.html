<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verve — Staff Sign In</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/gateway.css" />
  <link rel="stylesheet" href="./css/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Full bleed background -->
  <div class="bg-layer">
    <img src="./asset/gateway-bg.jpg" alt="" class="visual__img" aria-hidden="true" />
  </div>

  <main class="login-wrap">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-brand__logo-wrap">
          <img src="./asset/src logo.png" alt="Verve" class="login-brand__logo" />
        </div>
        <div class="login-brand__rule"></div>
        <span class="login-brand__name">Verve</span>
      </div>

      <!-- Heading -->
      <div class="login-heading">
        <span class="login-heading__eyebrow">Staff Access</span>
        <h1 class="login-heading__title">Sign In</h1>
      </div>

      <!-- Form -->
      <!-- [GHL] On submit: authenticate against staff account list, route to correct view by role -->
      <!-- Roles: frontdesk1/2/3 → staff.html | security1 → staff-qr.html | fnb_manager → staff-fnb.html | admin → staff.html -->
      <form class="login-form" id="staffLoginForm" novalidate>

        <div class="field" id="fieldStaffUsername">
          <label class="field__label" for="staffUsername">Username</label>
          <div class="field__wrap">
            <input
              class="field__input"
              type="text"
              id="staffUsername"
              name="staffUsername"
              placeholder="e.g. frontdesk1"
              autocomplete="username"
              required
            />
            <span class="field__line"></span>
          </div>
          <span class="field__error">Please enter your username.</span>
        </div>

        <div class="field" id="fieldStaffPassword">
          <label class="field__label" for="staffPassword">Password</label>
          <div class="field__wrap">
            <input
              class="field__input"
              type="password"
              id="staffPassword"
              name="staffPassword"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <span class="field__line"></span>
          </div>
          <span class="field__error">Please enter your password.</span>
        </div>

        <p id="loginError" style="color:#c0392b;font-size:0.85rem;margin:0;display:none;"></p>

        <button class="btn-login" type="button" id="signInBtn">
          <span>Sign In</span>
          <span>→</span>
        </button>

      </form>

      <!-- Back -->
      <a href="gateway.html" class="login-back">← Back to Gateway</a>

    </div>

    <p class="login-footer">Verve · Est. 1962 · Meridian Green</p>
  </main>

  <script src="./js/demo-mode.js"></script>
  <script>
    const API_BASE = 'https://backend-production-41dc3.up.railway.app';

    const ROLE_REDIRECT = {
      frontdesk: 'staff.html',
      security:  'staff-qr.html',
      fnb:       'staff-fnb.html',
      admin:     'staff.html',
    };

    document.getElementById('staffUsername').addEventListener('input', function () {
      document.getElementById('fieldStaffUsername').classList.remove('field--error');
    });
    document.getElementById('staffPassword').addEventListener('input', function () {
      document.getElementById('fieldStaffPassword').classList.remove('field--error');
    });

    document.getElementById('signInBtn').addEventListener('click', async () => {
      const username = document.getElementById('staffUsername').value.trim();
      const password = document.getElementById('staffPassword').value;
      const errorEl  = document.getElementById('loginError');

      errorEl.style.display = 'none';

      let hasError = false;
      if (!username) {
        document.getElementById('fieldStaffUsername').classList.add('field--error');
        hasError = true;
      }
      if (!password) {
        document.getElementById('fieldStaffPassword').classList.add('field--error');
        hasError = true;
      }
      if (hasError) return;

      try {
        const res  = await fetch(`${API_BASE}/api/auth/staff/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!data.success) {
          errorEl.textContent = data.message || 'Invalid username or password.';
          errorEl.style.display = 'block';
          return;
        }

        sessionStorage.setItem('staffToken', data.token);
        sessionStorage.setItem('staffUser',  JSON.stringify(data.staff));

        const redirect = ROLE_REDIRECT[data.staff.role] || 'staff.html';
        window.location.href = redirect;
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
      }
    });
  </script>

</body>
</html>
