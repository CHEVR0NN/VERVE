<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login · Verve</title>
  <link rel="icon" type="image/png" href="./asset/logo.png" />
  <script>
    // Applied before first paint to avoid a flash of the wrong theme.
    (function () {
      var saved = localStorage.getItem('vrv_theme');
      if (saved === 'dark' || saved === 'light') document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="split-screen">

    <!-- LEFT PANEL — 30% LOGIN -->
    <aside class="panel panel--login">

      <div class="panel__inner">

        <div class="brand">
          <div class="brand__logo-wrap">
            <!-- Replace src with actual logo path -->
            <img src="./asset/logo.png" alt="Verve" class="brand__logo" />
          </div>
          <div class="brand__rule"></div>
          <p class="brand__est">Est. 1983 · Nevada</p>
        </div>

        <div class="portal-heading">
          <span class="portal-heading__label">Member</span>
          <h1 class="portal-heading__title">LOGIN</h1>
        </div>

        <form class="login-form" id="loginForm" novalidate>

          <div class="field" id="fieldMembershipId">
            <label class="field__label" for="membershipId">Membership ID</label>
            <div class="field__wrap">
              <input
                class="field__input"
                type="text"
                id="membershipId"
                name="membershipId"
                placeholder="e.g. VRV-0001"
                autocomplete="off"
                value="VRV-0001"
                required
                style="text-transform:uppercase"
                oninput="this.value=this.value.toUpperCase()"
              />
              <span class="field__line"></span>
            </div>
            <span class="field__error" id="membershipIdError">Please enter your Membership ID.</span>
          </div>

          <div class="field" id="fieldEmailAddress">
            <label class="field__label" for="emailAddress">Email Address</label>
            <div class="field__wrap">
              <input
                class="field__input"
                type="email"
                id="emailAddress"
                name="emailAddress"
                placeholder="you@example.com"
                autocomplete="email"
                value="ava.sinclair@vrv.com"
                required
              />
              <span class="field__line"></span>
            </div>
            <span class="field__error" id="emailAddressError">Please enter your Email Address.</span>
          </div>

          <button class="btn-access" type="submit">Access Portal</button>

        </form>

        <footer class="panel__footer">
          <a href="#" class="footer-link">Need help?</a>
          <span class="footer-sep">·</span>
          <a href="#" class="footer-link">Privacy Policy</a>
          <span class="footer-sep">·</span>
          <button class="btn-theme-toggle" id="themeToggleBtn" aria-label="Switch to light mode" title="Switch theme">
            <svg class="theme-icon theme-icon--sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4.5"/>
              <path d="M12 2.5v2.5M12 19v2.5M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M2.5 12h2.5M19 12h2.5M4.6 19.4l1.8-1.8M17.6 6.4l1.8-1.8"/>
            </svg>
            <svg class="theme-icon theme-icon--moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
              <path d="M20 14.2A8.5 8.5 0 1 1 9.8 4a6.7 6.7 0 0 0 10.2 10.2z"/>
            </svg>
          </button>
        </footer>

      </div>

      <!-- Decorative vertical rule -->
      <div class="panel__edge-rule"></div>

    </aside>

    <!-- RIGHT PANEL — 70% IMAGE -->
    <div class="panel panel--visual" id="visualPanel">
      
      <img src="./asset/login-bg.jpg" alt="Verve Est. 1983, Nevada" class="visual__img" />
      <div class="visual__overlay"></div>
      <div class="visual__caption">
        <span class="visual__caption-line">Greenhills, Nevada</span>
        <span class="visual__caption-year">Since 1983</span>
        <span class="visual__chip">Private Members Club</span>
      </div>
    </div>

  </div>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/main.js"></script>

  <!-- GHL Chat Widget (temporarily disabled — uncomment to re-enable)
  <script
    src="https://widgets.leadconnectorhq.com/loader.js"
    data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js"
    data-widget-id="69896965e64c7357b550a8a4">
  </script>
  -->
</body>
</html>
