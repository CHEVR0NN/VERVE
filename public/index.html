<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verve — Member Portal</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="split-screen">

    <!-- LEFT PANEL — 30% LOGIN -->
    <aside class="panel panel--login">

      <div class="panel__inner">

        <div class="brand">
          <div class="brand__logo-wrap">
            <!-- Replace src with actual logo path -->
            <img src="./asset/src logo.png" alt="Verve" class="brand__logo" />
          </div>
          <div class="brand__rule"></div>
          <p class="brand__est">Est. 1962 · Singapore</p>
        </div>

        <div class="portal-heading">
          <span class="portal-heading__label">Member</span>
          <h1 class="portal-heading__title">LOGIN</h1>
        </div>

        <form class="login-form" id="loginForm" novalidate>

          <div class="field" id="fieldMembershipId">
            <label class="field__label" for="membershipId">Membership ID</label>
            <div class="field__wrap">
              <input
                class="field__input"
                type="text"
                id="membershipId"
                name="membershipId"
                placeholder="e.g. VRV-0001"
                autocomplete="off"
                required
                style="text-transform:uppercase"
                oninput="this.value=this.value.toUpperCase()"
              />
              <span class="field__line"></span>
            </div>
            <span class="field__error" id="membershipIdError">Please enter your Membership ID.</span>
          </div>

          <div class="field" id="fieldEmailAddress">
            <label class="field__label" for="emailAddress">Email Address</label>
            <div class="field__wrap">
              <input
                class="field__input"
                type="email"
                id="emailAddress"
                name="emailAddress"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
              <span class="field__line"></span>
            </div>
            <span class="field__error" id="emailAddressError">Please enter your Email Address.</span>
          </div>

          <button class="btn-access" type="submit">Access Portal</button>

        </form>

        <!-- <footer class="panel__footer">
          <a href="#" class="footer-link">Need help?</a>
          <span class="footer-sep">·</span>
          <a href="#" class="footer-link">Privacy Policy</a>
        </footer> -->

      </div>

      <!-- Decorative vertical rule -->
      <div class="panel__edge-rule"></div>

    </aside>

    <!-- RIGHT PANEL — 70% IMAGE -->
    <div class="panel panel--visual" id="visualPanel">
      <!-- Replace with actual image path -->
      <img src="./asset/login-bg.jpg" alt="Verve at Meridian Green" class="visual__img" />
      <div class="visual__overlay"></div>
      <div class="visual__caption">
        <span class="visual__caption-line">Meridian Green, Singapore</span>
        <span class="visual__caption-year">Since 1962</span>
      </div>
    </div>

  </div>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/main.js"></script>

  <!-- GHL Chat Widget (temporarily disabled — uncomment to re-enable)
  <script
    src="https://widgets.leadconnectorhq.com/loader.js"
    data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js"
    data-widget-id="69896965e64c7357b550a8a4">
  </script>
  -->
</body>
</html>
