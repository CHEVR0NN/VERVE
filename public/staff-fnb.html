<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F&amp;B Bookings · Verve Staff</title>
  <link rel="icon" type="image/png" href="./asset/logo.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/console.css" />
  <script src="./js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="console-wrap">

    <aside class="sidebar">
      <div class="sidebar__brand">
        <a href="staff.html" class="sidebar__logo-link" aria-label="Go to home"><img src="./asset/logo.png" alt="Verve" class="sidebar__logo" /></a>
        <span class="sidebar__title">Staff Console</span>
      </div>

      <nav class="sidebar__nav">
        <span class="sidebar__nav-label">Front Desk</span>
        <a href="staff.html" class="nav-item">
          <span class="nav-item__icon">≡</span>
          <span>Today's Schedule</span>
        </a>
        <a href="staff-booking.html" class="nav-item">
          <span class="nav-item__icon">◇</span>
          <span>Staff Booking</span>
        </a>
        <a href="staff-walkin.html" class="nav-item">
          <span class="nav-item__icon">→</span>
          <span>Log Walk-In</span>
        </a>
        <a href="staff-qr.html" class="nav-item">
          <span class="nav-item__icon">▣</span>
          <span>QR Verify</span>
        </a>
        <span class="sidebar__nav-label">Service</span>
        <a href="staff-fnb.html" class="nav-item nav-item--active">
          <span class="nav-item__icon">◈</span>
          <span>F&amp;B Bookings</span>
        </a>
        <a href="staff-cancel.html" class="nav-item">
          <span class="nav-item__icon">△</span>
          <span>Late Cancellations</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="staff-badge">
          <span class="staff-badge__name" id="staffName">Staff</span>
          <span class="staff-badge__role" id="staffRole">—</span>
        </div>
        <div class="sidebar__footer-actions">
          <a href="gateway.html" class="btn-logout" id="logoutBtn">Logout</a>
          <button class="btn-theme-toggle" id="themeToggleBtn" aria-label="Switch to light mode" title="Switch theme">
            <svg class="theme-icon theme-icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5M12 19v2.5M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M2.5 12h2.5M19 12h2.5M4.6 19.4l1.8-1.8M17.6 6.4l1.8-1.8"/></svg>
            <svg class="theme-icon theme-icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden><path d="M20 14.2A8.5 8.5 0 1 1 9.8 4a6.7 6.7 0 0 0 10.2 10.2z"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="console-main">

      <div class="view__header">
        <div>
          <span class="view__eyebrow">Staff Console</span>
          <h1 class="view__title">F&amp;B Bookings Today</h1>
          <!-- [GHL] Populated by JS: today's date SGT -->
          <p class="view__sub" id="fnbDate">—</p>
        </div>
        <div class="view__actions">
          <button class="btn-secondary" id="refreshFnbBtn">↻ Refresh</button>
        </div>
      </div>

      <div class="filter-bar">
        <select class="filter-select" id="filterFnbVenue">
          <option value="">All Outlets</option>
          <option value="Le Mansion">Le Mansion</option>
          <option value="Barkerslounge">Barker's Lounge</option>
          <option value="Oasis">Oasis</option>
        </select>
      </div>

      <!-- [GHL] GET /contacts/?customField[booking_type]=dining&customField[slot_date]=TODAY filtered to Le Mansion, Barker's, Oasis -->
      <div class="table-wrap">
        <table class="data-table" id="fnbTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Member Name</th>
              <th>Membership No.</th>
              <th>Venue</th>
              <th>Pax</th>
              <th>Special Requests</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="fnbBody">
            <tr class="table-empty"><td colspan="8">Loading F&amp;B bookings…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/staff-portal.js"></script>
</body>
</html>
