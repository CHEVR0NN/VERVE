<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verve — F&amp;B Bookings</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/console.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="console-wrap">

    <aside class="sidebar">
      <div class="sidebar__brand">
        <a href="staff.html" class="sidebar__logo-link" aria-label="Go to home"><img src="./asset/src logo.png" alt="Verve" class="sidebar__logo" /></a>
        <span class="sidebar__title">Staff Console</span>
      </div>

      <nav class="sidebar__nav">
        <a href="staff.html" class="nav-item">
          <span class="nav-item__icon">≡</span>
          <span>Today's Schedule</span>
        </a>
        <a href="staff-booking.html" class="nav-item">
          <span class="nav-item__icon">◇</span>
          <span>Staff Booking</span>
        </a>
        <a href="staff-walkin.html" class="nav-item">
          <span class="nav-item__icon">→</span>
          <span>Log Walk-In</span>
        </a>
        <a href="staff-qr.html" class="nav-item">
          <span class="nav-item__icon">▣</span>
          <span>QR Verify</span>
        </a>
        <a href="staff-fnb.html" class="nav-item nav-item--active">
          <span class="nav-item__icon">◈</span>
          <span>F&amp;B Bookings</span>
        </a>
        <a href="staff-cancel.html" class="nav-item">
          <span class="nav-item__icon">△</span>
          <span>Late Cancellations</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="staff-badge">
          <span class="staff-badge__name" id="staffName">Staff</span>
          <span class="staff-badge__role" id="staffRole">—</span>
        </div>
        <a href="gateway.html" class="btn-logout" id="logoutBtn">Logout</a>
      </div>
    </aside>

    <main class="console-main">

      <div class="view__header">
        <div>
          <h1 class="view__title">F&amp;B Bookings Today</h1>
          <!-- [GHL] Populated by JS: today's date SGT -->
          <p class="view__sub" id="fnbDate">—</p>
        </div>
        <div class="view__actions">
          <button class="btn-secondary" id="refreshFnbBtn">↻ Refresh</button>
        </div>
      </div>

      <div class="filter-bar">
        <select class="filter-select" id="filterFnbVenue">
          <option value="">All Outlets</option>
          <option value="Le Mansion">Le Mansion</option>
          <option value="Barkerslounge">Barker's Lounge</option>
          <option value="Oasis">Oasis</option>
        </select>
      </div>

      <!-- [GHL] GET /contacts/?customField[booking_type]=dining&customField[slot_date]=TODAY filtered to Le Mansion, Barker's, Oasis -->
      <div class="table-wrap">
        <table class="data-table" id="fnbTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Member Name</th>
              <th>Membership No.</th>
              <th>Venue</th>
              <th>Pax</th>
              <th>Special Requests</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="fnbBody">
            <tr class="table-empty"><td colspan="8">Loading F&amp;B bookings…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/staff-portal.js"></script>
</body>
</html>
