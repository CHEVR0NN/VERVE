<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Late Cancellation Fees · Verve Management</title>
  <link rel="icon" type="image/png" href="./asset/logo.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/console.css" />
  <script src="./js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="console-wrap">

    <aside class="sidebar" id="sidebarRoot" data-portal="management" data-active="fees"></aside>
    <script src="./js/sidebar.js"></script>

    <main class="console-main">

      <div class="view__header">
        <div>
          <span class="view__eyebrow">Management</span>
          <h1 class="view__title">Late Cancellation Fees</h1>
          <p class="view__sub">Manual billing reference for finance. Sorted by cancellation date descending.</p>
        </div>
      </div>

      <!-- [GHL] GET /contacts/ filtered by late_cancellation=true → sort by cancelled_at desc -->
      <!-- Actions: [Mark Paid] → booking_status:late_fee_paid | [Waive] → waiveFeeModal | [View Full Record] → GHL contact -->
      <!-- Fee amount defined in WF-08 (pending Verve Committee confirmation) — no payment integration in Phase 1 -->
      <div class="table-wrap">
        <table class="data-table" id="lateFeesTable">
          <thead>
            <tr>
              <th>Member</th>
              <th>Facility</th>
              <th>Slot Date &amp; Time</th>
              <th>Cancelled At</th>
              <th>Fee Status</th>
              <th>Waiver Reason</th>
              <th>Actioned By</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="lateFeesBody">
            <tr class="table-empty"><td colspan="8">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="modalOverlay" hidden></div>

  <dialog id="waiveFeeModal" class="modal-dialog">
    <button class="modal-close" data-close>&times;</button>
    <h3>Waive Late Cancellation Fee</h3>
    <p class="modal-step">Reason is required. Action logged for audit.</p>
    <form id="waiveFeeForm">
      <div class="field">
        <label class="field__label" for="waiverReason">Reason</label>
        <div class="field__wrap">
          <!-- [GHL] PUT /contacts/{id} → fee_waived:true, waiver_reason, waiver_by -->
          <input class="field__input" type="text" id="waiverReason" placeholder="e.g. Medical emergency" required />
          <span class="field__line"></span>
        </div>
      </div>
      <input type="hidden" id="waiverContactId" />
      <button class="btn-primary" type="submit">Confirm Waiver</button>
    </form>
  </dialog>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/mgmt-auth-guard.js"></script>
  <script src="./js/management-portal.js"></script>
</body>
</html>
