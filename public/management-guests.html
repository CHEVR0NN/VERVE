<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Record Audit · Verve Management</title>
  <link rel="icon" type="image/png" href="./asset/logo.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/console.css" />
  <script src="./js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="console-wrap">

    <aside class="sidebar" id="sidebarRoot" data-portal="management" data-active="guests"></aside>
    <script src="./js/sidebar.js"></script>

    <main class="console-main">

      <div class="view__header">
        <div>
          <span class="view__eyebrow">Management</span>
          <h1 class="view__title">Guest Record Audit</h1>
          <p class="view__sub">Monthly guest pass usage per member.</p>
           <!-- Same-guest count ≥ 2 flagged in amber. -->
        </div>
      </div>

      <!-- [GHL] GET /contacts/?customField[booking_type]=guest_pass → filter current month by slot_date → group by inviting_member_id -->
      <!-- Row class row--amber added by JS when same_guest_count ≥ 2 -->
      <!-- Actions: [Adjust Quota] → adjustQuotaModal | member rows expandable to show each guest record -->
      <div class="table-wrap">
        <table class="data-table" id="guestsTable">
          <thead>
            <tr>
              <th>Member Name</th>
              <th>Membership No.</th>
              <th>Monthly Quota</th>
              <th>Used This Month</th>
              <th>Same-Guest Count</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="guestsBody">
            <tr class="table-empty"><td colspan="6">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="modalOverlay" hidden></div>

  <dialog id="adjustQuotaModal" class="modal-dialog">
    <button class="modal-close" data-close>&times;</button>
    <h3>Adjust Guest Quota</h3>
    <p class="modal-step">Admin override. Action logged as a contact note.</p>
    <form id="adjustQuotaForm">
      <div class="field">
        <label class="field__label" for="quotaValue">New Quota Value</label>
        <div class="field__wrap">
          <!-- [GHL] PUT /contacts/{id} → guest_quota_override:[value] + POST /contacts/{id}/notes -->
          <input class="field__input" type="number" id="quotaValue" min="0" max="20" required />
          <span class="field__line"></span>
        </div>
      </div>
      <input type="hidden" id="quotaContactId" />
      <button class="btn-primary" type="submit">Apply Adjustment</button>
    </form>
  </dialog>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/mgmt-auth-guard.js"></script>
  <script src="./js/management-portal.js"></script>
</body>
</html>
