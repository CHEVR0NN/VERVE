<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox · Verve Management</title>
  <link rel="icon" type="image/png" href="./asset/logo.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/console.css" />
  <script src="./js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
  <style>
    /* Inbox — Dusk Glow & Rose Gold (matches css/console.css conventions) */
    .inbox-thread {
      background: var(--glass-card);
      border: 1px solid var(--glass-border);
      border-top: 1px solid rgba(212,154,143,0.3);
      border-radius: var(--radius-2xl, 20px);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 18px 40px -24px rgba(0,0,0,0.6);
      margin-bottom: 18px;
      overflow: hidden;
    }
    .inbox-thread__head { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 18px 26px; cursor: pointer; transition: background 0.15s; }
    .inbox-thread__head:hover { background: rgba(212,154,143,0.05); }
    .inbox-thread__title { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--ink); }
    .inbox-thread__meta { font-family: var(--font-ui); font-size: 12px; color: var(--muted); margin-top: 2px; }
    .inbox-thread__badge { background: linear-gradient(135deg, #D49A8F 0%, #F5E6E3 100%); color: #1a191f; font-family: var(--font-display); font-size: 12px; font-weight: 700; padding: 4px 13px; border-radius: var(--radius-pill, 999px); letter-spacing: 0.06em; white-space: nowrap; }
    .inbox-thread__chevron { font-size: 14px; color: var(--gold-dim); transition: transform 0.2s; }
    .inbox-thread__head.is-open .inbox-thread__chevron { transform: rotate(180deg); }
    .inbox-thread__body { display: none; border-top: 1px solid var(--glass-border); padding: 20px 26px; }
    .inbox-thread__body.is-open { display: block; }
    .inbox-notice { font-family: var(--font-ui); font-size: 13px; color: var(--muted); padding: 12px 16px; background: rgba(212,154,143,0.05); border: 1px solid rgba(212,154,143,0.14); border-left: 2px solid var(--gold); border-radius: var(--radius-xl, 16px); margin-bottom: 16px; }
    .inbox-notice strong { color: var(--ink); }
    .inbox-messages { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; margin-bottom: 16px; }
    .inbox-msg { display: flex; gap: 10px; align-items: flex-start; }
    .inbox-msg--mgmt { flex-direction: row-reverse; }
    .inbox-msg__avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--navy); color: var(--gold-light); font-family: var(--font-display); font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .inbox-msg--mgmt .inbox-msg__avatar { background: linear-gradient(135deg, #D49A8F 0%, #F5E6E3 100%); color: #1a191f; }
    .inbox-msg__bubble { max-width: 70%; padding: 10px 16px; border-radius: var(--radius-xl, 16px); background: rgba(var(--ink-rgb),0.05); border: 1px solid var(--glass-border); }
    .inbox-msg--mgmt .inbox-msg__bubble { background: rgba(212,154,143,0.12); border-color: rgba(212,154,143,0.18); }
    .inbox-msg__name { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--ink); }
    .inbox-msg__name em { font-weight: 500; color: var(--gold); font-size: 13px; }
    .inbox-msg__time { font-family: var(--font-ui); font-size: 10px; color: #6c6c74; margin-left: 8px; }
    .inbox-msg__text { font-family: var(--font-ui); font-size: 13px; color: var(--ink); line-height: 1.55; margin: 2px 0 0; }
    .inbox-reply-form { display: flex; gap: 10px; }
    .inbox-reply-input { flex: 1; padding: 12px 16px 13px; border: 1px solid transparent; border-radius: var(--radius-xl, 16px); background: rgba(var(--ink-rgb), 0.045); font-family: var(--font-ui); font-size: 13px; color: var(--ink); letter-spacing: 0.02em; outline: none; transition: border-color 0.25s, box-shadow 0.25s, background-color 0.25s; }
    .inbox-reply-input:focus { border-color: var(--gold); background: rgba(var(--ink-rgb), 0.065); box-shadow: 0 0 0 3px rgba(var(--gold-rgb), 0.14), 0 6px 22px -8px rgba(var(--gold-rgb), 0.35); }
    .inbox-reply-input::placeholder { color: #6c6c74; font-style: italic; }
    .inbox-reply-btn { padding: 11px 26px; background: linear-gradient(135deg, #D49A8F 0%, #F5E6E3 100%); color: #1a191f; border: none; border-radius: var(--radius-pill, 999px); font-family: var(--font-display); font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; flex-shrink: 0; transition: filter 0.2s, box-shadow 0.2s, transform 0.15s; }
    .inbox-reply-btn:hover { filter: brightness(1.05); transform: translateY(-1px); box-shadow: 0 0 20px rgba(212,154,143,0.35); }
    .inbox-empty { text-align: center; padding: 48px; font-family: var(--font-display); font-size: 16px; color: var(--muted); font-style: italic; opacity: .7; }
  </style>
</head>
<body>

  <div class="console-wrap">

    <aside class="sidebar" id="sidebarRoot" data-portal="management" data-active="inbox"></aside>
    <script src="./js/sidebar.js"></script>

    <main class="console-main">

      <div class="view__header">
        <div>
          <span class="view__eyebrow">Management</span>
          <h1 class="view__title">Inbox</h1>
          <p class="view__sub">Member replies and enquiries on facility &amp; venue block notices.</p>
        </div>
      </div>

      <div id="inboxContainer">
        <p class="inbox-empty">Loading...</p>
      </div>

    </main>
  </div>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/mgmt-auth-guard.js"></script>
  <script src="./js/management-portal.js"></script>
</body>
</html>
