<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verve — Today's Schedule</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/console.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="console-wrap">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar__brand">
        <a href="staff.html" class="sidebar__logo-link" aria-label="Go to home"><img src="./asset/src logo.png" alt="Verve" class="sidebar__logo" /></a>
        <span class="sidebar__title">Staff Console</span>
      </div>

      <nav class="sidebar__nav">
        <a href="staff.html" class="nav-item nav-item--active">
          <span class="nav-item__icon">≡</span>
          <span>Today's Schedule</span>
        </a>
        <a href="staff-booking.html" class="nav-item">
          <span class="nav-item__icon">◇</span>
          <span>Staff Booking</span>
        </a>
        <a href="staff-walkin.html" class="nav-item">
          <span class="nav-item__icon">→</span>
          <span>Log Walk-In</span>
        </a>
        <a href="staff-qr.html" class="nav-item">
          <span class="nav-item__icon">▣</span>
          <span>QR Verify</span>
        </a>
        <a href="staff-fnb.html" class="nav-item">
          <span class="nav-item__icon">◈</span>
          <span>F&amp;B Bookings</span>
        </a>
        <a href="staff-cancel.html" class="nav-item">
          <span class="nav-item__icon">△</span>
          <span>Late Cancellations</span>
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="staff-badge">
          <span class="staff-badge__name" id="staffName">Staff</span>
          <span class="staff-badge__role" id="staffRole">—</span>
        </div>
        <a href="gateway.html" class="btn-logout" id="logoutBtn">Logout</a>
      </div>
    </aside>

    <!-- Main content -->
    <main class="console-main">

      <div class="view__header">
        <div>
          <h1 class="view__title">Today's Schedule</h1>
          <!-- [GHL] Populated by JS: today's date SGT -->
          <p class="view__sub" id="scheduleDate">—</p>
        </div>
        <div class="view__actions">
          <button class="btn-secondary" id="refreshScheduleBtn">↻ Refresh</button>
          <span class="refresh-badge" id="lastRefreshed">Last refreshed: —</span>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <select class="filter-select" id="filterType">
          <option value="">All Types</option>
          <option value="facility">Facilities Only</option>
          <option value="dining">F&amp;B Only</option>
          <option value="guest_pass">Guest Passes Only</option>
        </select>
        <select class="filter-select" id="filterVenue">
          <option value="">All Venues</option>
          <option value="Tennis Court">Tennis Court</option>
          <option value="Squash Court">Squash Court</option>
          <option value="Gym">Gym</option>
          <option value="Le Mansion">Le Mansion</option>
          <option value="Barkerslounge">Barker's Lounge</option>
          <option value="Oasis">Oasis</option>
        </select>
      </div>

      <!-- Schedule table -->
      <!-- [GHL] GET /contacts/?locationId=...&customField[slot_date]=TODAY_SGT&customField[booking_status]=confirmed -->
      <!-- Auto-refresh every 60s via JS. Row classes: row--green (checked_in), row--red (no_show), row--overdue (past start, still confirmed) -->
      <div class="table-wrap">
        <table class="data-table" id="scheduleTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Member Name</th>
              <th>Membership No.</th>
              <th>Facility / Venue</th>
              <th>Pax</th>
              <th>Type</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="scheduleBody">
            <!-- [GHL] Injected by JS -->
            <tr class="table-empty">
              <td colspan="8">Loading schedule…</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/staff-portal.js"></script>
</body>
</html>
