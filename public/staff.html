<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Schedule · Verve Staff</title>
  <link rel="icon" type="image/png" href="./asset/logo.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/console.css" />
  <script src="./js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="console-wrap">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebarRoot" data-portal="staff" data-active="schedule"></aside>
    <script src="./js/sidebar.js"></script>

    <!-- Main content -->
    <main class="console-main">

      <div class="view__header">
        <div>
          <span class="view__eyebrow">Staff Console</span>
          <h1 class="view__title">Today's Schedule</h1>
          <!-- [GHL] Populated by JS: today's date SGT -->
          <p class="view__sub" id="scheduleDate">—</p>
        </div>
        <div class="view__actions">
          <button class="btn-secondary" id="refreshScheduleBtn">↻ Refresh</button>
          <span class="refresh-badge" id="lastRefreshed">Last refreshed: —</span>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <select class="filter-select" id="filterType">
          <option value="">All Types</option>
          <option value="facility">Facilities Only</option>
          <option value="dining">F&amp;B Only</option>
          <option value="guest_pass">Guest Passes Only</option>
        </select>
        <select class="filter-select" id="filterVenue">
          <option value="">All Venues</option>
          <option value="Tennis Court">Tennis Court</option>
          <option value="Squash Court">Squash Court</option>
          <option value="Gym">Gym</option>
          <option value="Le Mansion">Le Mansion</option>
          <option value="Barkerslounge">Barker's Lounge</option>
          <option value="Oasis">Oasis</option>
        </select>
      </div>

      <!-- Schedule table -->
      <!-- [GHL] GET /contacts/?locationId=...&customField[slot_date]=TODAY_SGT&customField[booking_status]=confirmed -->
      <!-- Auto-refresh every 60s via JS. Row classes: row--green (checked_in), row--red (no_show), row--overdue (past start, still confirmed) -->
      <div class="table-wrap">
        <table class="data-table" id="scheduleTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Member Name</th>
              <th>Membership No.</th>
              <th>Facility / Venue</th>
              <th>Pax</th>
              <th>Type</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="scheduleBody">
            <!-- [GHL] Injected by JS -->
            <tr class="table-empty">
              <td colspan="8">Loading schedule…</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/staff-portal.js"></script>
</body>
</html>
