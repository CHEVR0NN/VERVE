<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Booking · Verve Staff</title>
  <link rel="icon" type="image/png" href="./asset/logo.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/console.css" />
  <script src="./js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Faculty+Glyphic&family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="console-wrap">

    <aside class="sidebar" id="sidebarRoot" data-portal="staff" data-active="booking"></aside>
    <script src="./js/sidebar.js"></script>

    <main class="console-main">

      <div class="view__header">
        <div>
          <span class="view__eyebrow">Staff Console</span>
          <h1 class="view__title">Staff Booking</h1>
          <p class="view__sub">Create a booking on behalf of a member.</p>
        </div>
      </div>

      <!-- [GHL] On submit: POST intake webhook with member contactId + booking_source:staff -->
      <form class="form-panel" id="staffBookingForm">

        <!-- Step 1: Find member -->
        <div class="form-step">
          <p class="form-step__label">Step 1 — Find Member</p>
          <div class="field">
            <label class="field__label" for="sbMemberNo">Membership Number</label>
            <div class="field__wrap">
              <!-- [GHL] GET /contacts/?query=[value] -->
              <input class="field__input" type="text" id="sbMemberNo" placeholder="e.g. VRV-0001" required />
              <span class="field__line"></span>
            </div>
          </div>
          <button type="button" class="btn-secondary" id="sbSearchBtn">Find Member</button>
          <!-- [GHL] Populated after search -->
          <div class="inline-result" id="sbMemberResult" hidden>
            <span id="sbMemberName">—</span>
            <span class="sep">·</span>
            <span id="sbMemberTier">—</span>
          </div>
        </div>

        <!-- Step 2: Booking details -->
        <div class="form-step">
          <p class="form-step__label">Step 2 — Booking Details</p>
          <div class="form-grid">
            <!-- GHL: {{contact.name}} -->
            <div class="field">
              <label class="field__label" for="sbFullName">Full Name</label>
              <div class="field__wrap">
                <input class="field__input" type="text" id="sbFullName" placeholder="Member full name" required />
                <span class="field__line"></span>
              </div>
            </div>
            <div class="field">
              <label class="field__label" for="sbType">Booking Type</label>
              <select class="field__input field__select" id="sbType" required>
                <option value="">Select type</option>
                <option value="Facility">Facility</option>
                <option value="Dining">Dining</option>
              </select>
            </div>
            <!-- GHL: {{contact.facility_or_venue}} -->
            <div class="field" id="sbVenueField" hidden>
              <label class="field__label" for="sbVenue">Facility / Venue</label>
              <select class="field__input field__select" id="sbVenue" required>
                <option value="">Select venue</option>
              </select>
            </div>
            <!-- GHL: {{contact.booking_shift}} — only visible when Le Mansion is selected -->
            <div class="field" id="sbShiftField" hidden>
              <label class="field__label" for="sbShift">Shift</label>
              <select class="field__input field__select" id="sbShift">
                <option value="">Select shift</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
              </select>
            </div>
            <!-- GHL: {{contact.slot_date}} -->
            <div class="field">
              <label class="field__label" for="sbDate">Date</label>
              <div class="field__wrap">
                <input class="field__input" type="date" id="sbDate" required />
                <span class="field__line"></span>
              </div>
            </div>
            <!-- GHL: {{contact.slot_start_time}} -->
            <div class="field">
              <label class="field__label" for="sbTime">Start Time</label>
              <div class="field__wrap">
                <input class="field__input" type="time" id="sbTime" required />
                <span class="field__line"></span>
              </div>
            </div>
            <!-- GHL: {{contact.slot_end_time}} -->
            <div class="field">
              <label class="field__label" for="sbEndTime">End Time</label>
              <div class="field__wrap">
                <input class="field__input" type="time" id="sbEndTime" required />
                <span class="field__line"></span>
              </div>
            </div>
            <!-- GHL: {{contact.outlet_pax}} -->
            <div class="field">
              <label class="field__label" for="sbPax">Pax Count</label>
              <div class="field__wrap">
                <input class="field__input" type="number" id="sbPax" min="1" max="20" value="1" required />
                <span class="field__line"></span>
              </div>
            </div>
          </div>
        </div>

        <button class="btn-primary" type="submit">Confirm &amp; Create Booking</button>
      </form>

    </main>
  </div>

  <script src="./js/demo-mode.js"></script>
  <script src="./js/staff-portal.js"></script>
</body>
</html>
